entryPoints:
    web:
        address: ":80"
        http:
            redirections:
                entryPoint:
                    to: websecure
                    scheme: https
                    permanent: true
                    priority: 10000
    websecure:
        address: ":443"
        transport:
            respondingTimeouts:
                readTimeout: 3600
        http:
            tls:
                certResolver: cloudflare_dns_production
                domains:
                    - main: "xbhl.online"
                      sans:
                          - "*.intranet.xbhl.online"

serversTransport:
    insecureSkipVerify: false

certificatesResolvers:
    cloudflare_dns_staging:
        acme:
            email: barczynski.lukasz@gmail.com
            storage: /letsencrypt/acme-stg.json
            caServer: "https://acme-staging-v02.api.letsencrypt.org/directory"
            dnsChallenge:
                provider: cloudflare
                resolvers:
                    - 1.1.1.1:53
                    - 8.8.8.8:53

    cloudflare_dns_production:
        acme:
            email: barczynski.lukasz@gmail.com
            storage: /letsencrypt/acme.json
            dnsChallenge:
                provider: cloudflare
                resolvers:
                    - 1.1.1.1:53
                    - 8.8.8.8:53

providers:
    file:
        directory: /dynamic-config-files
        watch: true
    docker: {}

api:
    dashboard: true
    insecure: false

ping: {}

log:
    level: WARN
